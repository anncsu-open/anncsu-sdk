openapi: "3.0.3"
info:
  title: ANNCSU REST API - COORDINATE - ACCESSI
  description: |-
    API dei servizi REST di ANNCSU su PDND per aggiornamento delle coordinate degli accessi
    Pattern Model applicati:
    - [AUDIT_REST_02 ] Inoltro dati tracciati nel dominio del Fruitore REST con correlazione
    - [BLOCK_REST] Blocking REST
    - [INTEGRITY_REST_02] Integrità del payload messaggio REST in PDND
  termsOfService: "https://govway.org/documentazione/api/index.html"
  contact:
    email: "infopdnd_anncsu@sogei.it"
  version: "1.0.1"
  x-api-id: "https://govway.org/apiConfig"
  x-summary: "Servizi per la configurazione di GovWay"
servers:
  - url: https://modipa.agenziaentrate.it/govway/rest/in/AgenziaEntrate/anncsuaccessi/v1
    description: "l'accesso all'API e' protetta dai controlli di accesso su GovWay"
  - url: https://modipa-val.agenziaentrate.it/govway/rest/in/AgenziaEntrate/anncsuaccessi/v1
    description: "l'accesso alle API di validazione e' protetta dai controlli di accesso su GovWay"
tags:
  - name: anncsu
    description: Servizi ANNCSU su PDND
  - name: status
security:
  - bearerAuth: []
    Agid-JWT-Signature: []
    Agid-JWT-TrackingEvidence: []
paths:
  /gestionecoordinate:
    post:
      description: Questo endpoint consente di eseguire una modifica o inserimento di coordinate su un accesso specifico.
      operationId: gestionecoordinate
      summary: Esegui un'operazione sulle coordinate di un accesso
      tags:
        - "anncsu"
      requestBody:
        description: Dati necessari per l'operazione sugli accessi.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RichiestaOperazione'
      responses:
        '200':
          description: Operazione eseguita con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RispostaOperazione'
        '400':
          description: Richiesta non valida
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/RispostaErrore'
        '401':
          description: Operazione non consentita
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/RispostaErrore'
        '404':
          description: Accesso non trovato
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/RispostaErrore'
        '500':
          description: Errore interno del server
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/RispostaErrore'
  /status:
    get:
      summary: Ritorna lo stato dell'applicazione.
      description: |
        Ritorna lo stato dell'applicazione. A scopo
        di test, su base randomica puo' ritornare
        un errore.
      operationId: show_status
      tags:
        - "status"
      responses:
        '200':
          description: "Il server ha ritornato lo status. \n"
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '503':
          description: "Il server non è disponibile. \n"
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  status:
                    type: string
components:
  schemas:
    RichiestaOperazione:
      type: object
      properties:
        richiesta:
          type: object
          properties:
            accesso:
              type: object
              properties:
                codcom:
                  type: string
                  format: X999
                  description: Codice del comune (obbligatorio)
                  example: "A062"
                progr_civico:
                  type: string
                  maxLength: 15
                  description: Progressivo accesso
                  example: '1370588'
                coordinate:
                  type: object
                  properties:
                    x:
                      type: string
                      nullable: true
                      description: Coordinata X, obbligatoria se viene valorizzata Y. (Valori ammessi in Italia 6.0 ≤ x ≤ 18.0)
                      example: '13.1022000'
                    y:
                      type: string
                      maxLength: 12
                      nullable: true
                      description: Coordinata Y, obbligatoria se viene valorizzata X. (Valori ammessi in Italia 36.0 ≤ y ≤ 47.0)
                      example: '41.8847600'
                    z:
                      type: string
                      maxLength: 7
                      nullable: true
                      description: Quota, da non valorizzare in assenza di X e Y, espressa in metri
                      example: '150'
                    metodo:
                      type: string
                      maxLength: 1
                      nullable: true
                      description: Metodo di rilevazione, da non valorizzare in assenza di X e Y. (Valori ammessi da 1 a 4)
                      example: "3"
    RispostaOperazione:
      type: object
      properties:
        idRichiesta:
          type: string
          maxLength: 15
          description: Identificativo assegnato alla richiesta
          example: '5144'
        esito:
          type: string
          description: Esito dell'operazione
          example: "0"
        messaggio:
          type: string
          description: Messaggio associato all'esito
          example: "OK"
        dati:
          type: array
          items:
            type: object
            properties:
              progr_civico:
                type: string
                maxLength: 15
                description: Progressivo civico
                example: '1370588'
              codice_civico_comunale:
                type: string
                maxLength: 30
                nullable: true
                description: Codifica comunale dell'accesso
                example: "7569A"
              numero:
                type: string
                maxLength: 5
                description: Numero civico
                example: '12'
              esponente:
                type: string
                maxLength: 15
                example: "A"
              specificita:
                type: string
                maxLength: 5
                example: "ROSSO"
              metrico:
                type: string
                maxLength: 6
                description: Metrico
                example: '300'
              sez_censimento:
                type: string
                description: Sezione di censimento
                example: "9"
              data_inizio:
                type: string
                description: Data di inizio validità
              data_fine:
                type: string
                description: Data di fine validità
              progr_nazionale:
                type: string
                description: Progressivo nazionale
                example: "2000449"
              codcom:
                type: string
                description: Codice comune
                example: "A062"
              coordinata_x_comune:
                type: string
                description: Coordinata X comune
                example: '13.1022001143'
              coordinata_y_comune:
                type: string
                description: Coordinata Y comune
                example: '41.88476233032955'
              coordinata_z_comune:
                type: string
                description: Quota del comune
                example: '0'
              metodo:
                type: string
                nullable: true
                example:
              data_ini_valid_amm:
                type: string
                nullable: true
                description: Data di inizio validità amministrativa.
                example: "08/10/2024"
              data_fine_valid_amm:
                type: string
                nullable: true
                description: Data di fine validità amministrativa.
                example: "08/10/2024"
              isolato:
                type: string
                maxLength: 4
                nullable: true
                description: Codice isolato, facoltativo, da valorizzare solo per operazione_civico='I','R'
                example: '101'
    RispostaErrore:
      type: object
      properties:
        id:
          type: string
          description: Identificativo dell'operazione.
          example: '5144'
        codice:
          type: string
          description: Codice di errore
          example: '23'
        messaggio:
          type: string
          description: Messaggio di errore.
          example: "Errore di validazione: [specifica qui il messaggio di errore]"
  securitySchemes:
    bearerAuth:
      type: http
      description: 'A bearer token in the format of a JWS and conformed to the specifications included in [RFC8725](https://tools.ietf.org/html/RFC8725).'
      scheme: bearer
      bearerFormat: JWT
    Agid-JWT-Signature:
      type: apiKey
      in: header
      name: Agid-JWT-Signature
      description: |-
        Header della firma di JWS.
        Il valore di questo header è una firma JWS.
        Vedere Modi  [integrity_rest_02] Integrità del payload del messaggio REST in PDND
    Agid-JWT-TrackingEvidence:
      type: apiKey
      in: header
      name: Agid-JWT-TrackingEvidence
      description: |-
        Header della firma di JWS.
        Il valore di questo header è una firma JWS.
        Vedere Modi  [audit_rest_02] Inoltro dati tracciati nel dominio del Fruitore REST con correlazione
        Claim da includere:
            userID, un identificativo univoco dell'utente interno al dominio del fruitore che ha determinato l'esigenza della request di accesso all'e-service dell'erogatore;
            userLocation, un identificativo univoco della postazione interna al dominio del fruitore da cui è avviata l'esigenza della request di accesso all'e-service dell'erogatore;
            LoA, livello di sicurezza o di garanzia adottato nel processo di autenticazione informatica nel dominio del fruitore.
